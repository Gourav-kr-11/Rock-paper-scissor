<!DOCTYPE html>
<html>
  <head>
    <title>Boolean</title>
  </head>
  <body>
    <script>
       
       //ternery operator

       const result =true ? 'truthy' : 'falsy';
       console.log(result);

       false && console.log('hello');

       const message = false && 'hello';
       console.log(message);

       const message2 = true && 'hello';
       console.log(message2);   
       
       const currency = undefined || 'USD';
       console.log(currency);
       
    </script>
  </body>
</html>
