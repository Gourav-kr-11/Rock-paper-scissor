<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/13-rock-paper-scissors.css">
  </head>
  <body>
    <p class="title">
      Rock Paper Scissors
    </p>

    <button onclick="
    playGame('rock')
     " class="move-button">
     <img class="move-icon" src="image/rock-emoji.png">
    </button>

    <button onclick=" 
     playGame('paper')
     " class="move-button" ><img class="move-icon" src="image/paper-emoji.png"></button>

    <button onclick="
       playGame('scissors')
      " class="move-button"><img class="move-icon" src="image/scissors-emoji.png"></button>

    <p class="js-result result"></p>
    
    <p class="js-move">
     
    </p>

    <p class="js-score score"></p>

    <button onclick ="
    score.wins=0;
    score.losses=0;
    score.ties=0;
    localStorage.removeItem('score');
    updateScoreElement();
    " class="reset-score-button">
      Reset Score
    </button>

    <button class="auto-play-button" onclick="
    autoPlay();
    ">Auto Play</button>

    <script src="scripts/13-rock-paper-scissor.js"></script>
  </body>
</html>
