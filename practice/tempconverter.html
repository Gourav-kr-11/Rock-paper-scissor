    <script>
      function convertToFahrenheit(celsius){
        console.log((celsius*9/5)+32);
      }
      convertToFahrenheit(25);
 
      function convertToCelsius(Fahrenheit){
        console.log((Fahrenheit-32)*5/9);
      }
      convertToCelsius(86);


      function converToTemperature(degree,unit){
          if(unit==='C'){
           console.log(convertToFahrenheit(degree)) ;
          }
          else if(unit==='F'){
            console.log(convertToCelsius(degree));
          }
      }
      converToTemperature(25,'C')
      converToTemperature(86,'F')
